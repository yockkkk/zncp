server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/food_recommend?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# AI 模型配置
ai:
  vision:
    api-key: ${MIMO_API_KEY:}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    model: mimo-v2-omni
    max-tokens: 1500
  embedding:
    api-key: ${DASHSCOPE_API_KEY:}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: text-embedding-v3
    dimensions: 1024
  rerank:
    api-key: ${MIMO_API_KEY:}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    model: mimo-v2.5-pro
    max-tokens: 4096
  script:
    api-key: ${MIMO_API_KEY:}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    model: mimo-v2.5-pro
    max-tokens: 1500

# Qdrant 向量数据库配置
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  collection-name: dish_vector_collection

# OSS 配置
oss:
  enabled: false
  endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET:java-ai7777777}

# 本地文件上传配置
upload:
  local-path: ./uploads
  base-url: http://localhost:8080/uploads

# JWT 配置
jwt:
  secret: ${JWT_SECRET:change-me-in-production-please-32bytes}
  expiration: ${JWT_EXPIRATION_MS:86400000}

# 微信小程序
wx:
  appid: ${WX_APPID:}
  secret: ${WX_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
